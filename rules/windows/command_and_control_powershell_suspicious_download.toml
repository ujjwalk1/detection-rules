[metadata]
creation_date = "2025/01/06"
integration = ["endpoint", "windows"]
maturity = "production"
updated_date = "2025/01/06"

[rule]
author = ["Elastic"]
description = """
Detects PowerShell commands downloading files to temporary directories. Attackers commonly use PowerShell's web request capabilities to download malicious payloads to temp folders for execution.
"""
from = "now-9m"
index = [
    "logs-endpoint.events.*",
    "winlogbeat-*",
    "logs-windows.*",
    "endgame-*"
]
language = "eql"
license = "Elastic License v2"
name = "PowerShell Download to Temp Directory"
note = """## Investigation Guide

### Analyzing PowerShell Download Activity

This rule identifies PowerShell download commands targeting temporary directories, a common technique used by malware to stage payloads.

#### Investigation Steps

- Check the PowerShell command line for:
  - Source URL being accessed
  - Destination file path
  - File extension of downloaded content
- Examine the downloaded file if it still exists
- Review parent process that launched PowerShell
- Look for subsequent execution of downloaded files

#### Common False Positives

- Software deployment scripts
- Administrative automation tools
- Development workflows downloading dependencies

#### Response Actions

- Quarantine suspicious downloaded files
- Review network connections to source URLs
- Check for execution of downloaded content
"""
references = [
    "https://attack.mitre.org/techniques/T1105/",
    "https://attack.mitre.org/techniques/T1059/001/"
]
risk_score = 47
rule_id = "a8f2e7c1-3b5d-4e2f-9c1a-6d8e2f4b9a7c"
severity = "medium"
tags = [
    "Domain: Endpoint",
    "OS: Windows",
    "Use Case: Threat Hunting",
    "Tactic: Command and Control",
    "Data Source: Elastic Defend"
]
type = "eql"

query = '''
process where host.os.type == "windows" and event.type == "start" and
  process.name.caseless : ("powershell.exe", "pwsh.exe") and
  process.command_line.caseless : ("*invoke-webrequest*", "*iwr *", "*wget *", "*curl *") and
  (
    process.command_line.caseless : ("*-outfile*", "*-o *") or
    (process.command_line.caseless : "*>*" and 
     process.command_line.caseless : ("*.exe*", "*.dll*", "*.bat*", "*.cmd*", "*.ps1*"))
  ) and
  process.command_line.caseless : ("*\\temp\\*", "*\\tmp\\*", "*%temp%*", "*%tmp%*", "*\\windows\\temp\\*") and
  not process.command_line.caseless : ("*microsoft.com*", "*github.com*", "*office.com*", "*adobe.com*")
'''

[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1105"
name = "Ingress Tool Transfer"
reference = "https://attack.mitre.org/techniques/T1105/"

[[rule.threat.technique]]
id = "T1059"
name = "Command and Scripting Interpreter"
reference = "https://attack.mitre.org/techniques/T1059/"
[[rule.threat.technique.subtechnique]]
id = "T1059.001"
name = "PowerShell"
reference = "https://attack.mitre.org/techniques/T1059/001/"

[rule.threat.tactic]
id = "TA0011"
name = "Command and Control"
reference = "https://attack.mitre.org/tactics/TA0011/"

[rule.version]
version = 1
[rule.exceptions_list]

